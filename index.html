  <body>
    <div id="root"></div>
    <script>
      (() => {
        const isDevPreview = location.hostname.includes("lovableproject.com") || location.hostname === "localhost" || location.port === "8080";
        if (!isDevPreview) return;

        const OVERLAY_ID = "ava-vite-preflight-overlay";

        const showOverlay = () => {
          if (document.getElementById(OVERLAY_ID)) return;
          const el = document.createElement("div");
          el.id = OVERLAY_ID;
          el.style.cssText = "position:fixed;right:20px;bottom:20px;z-index:2147483647;width:min(420px,calc(100vw - 32px));padding:16px;border:1px solid hsl(42 92% 54% / .35);border-radius:18px;background:hsl(220 100% 99% / .94);box-shadow:0 24px 70px hsl(222 90% 24% / .22);backdrop-filter:blur(22px) saturate(1.35);color:hsl(222 84% 18%);font:500 14px/1.45 Inter,system-ui,sans-serif";
          el.innerHTML = '<div style="display:flex;gap:12px;align-items:flex-start"><div style="width:36px;height:36px;display:grid;place-items:center;flex:0 0 auto;border-radius:999px;background:linear-gradient(135deg,hsl(224 100% 45%),hsl(42 92% 54%));color:white;box-shadow:0 10px 24px hsl(224 100% 45% / .28)">↻</div><div style="min-width:0;flex:1"><div style="font-weight:800;margin-bottom:3px">Preview reconnecting</div><div style="opacity:.78">The dev server or styles dropped. The preview will reload cleanly.</div><button type="button" style="margin-top:12px;cursor:pointer;border:0;border-radius:999px;padding:9px 14px;background:linear-gradient(135deg,hsl(224 100% 45%),hsl(42 92% 54%));color:white;font:800 13px/1 Inter,system-ui,sans-serif">Reload preview</button></div></div>';
          el.querySelector("button").addEventListener("click", () => location.reload());
          document.body.appendChild(el);
        };

        const recover = () => {
          showOverlay();
        };

        const isRecoverable = (value) => /vite.*connection lost|server connection lost|failed to fetch dynamically imported module|importing a module script failed|stylesheet|css/i.test(String(value));
        const originalLog = console.log.bind(console);
        console.log = (...args) => {
          originalLog(...args);
          if (args.some(isRecoverable)) recover();
        };

        window.addEventListener("error", (event) => isRecoverable(event.message || event.filename) && recover(), true);
        window.addEventListener("unhandledrejection", (event) => isRecoverable(event.reason?.message || event.reason) && recover(), true);

        navigator.serviceWorker?.getRegistrations?.().then((registrations) => registrations.forEach((registration) => registration.unregister()));
        window.caches?.keys?.().then((keys) => keys.forEach((key) => caches.delete(key)));
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
