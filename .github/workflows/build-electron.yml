name: Build & Release AVA Softphone

on:
  push:
    tags:
      - 'v*.*.*'
      - 'desktop-v*'
  release:
    types: [published, created]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cat apps/ava-softphone-desktop/package.json | grep '"version"'

  build-windows:
    needs: verify-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: apps/ava-softphone-desktop

      - name: Overwrite vite.config.ts AFTER install
        shell: pwsh
        working-directory: apps/ava-softphone-desktop
        run: |
          $c = 'import { defineConfig } from "vite"' + "`n"
          $c += 'import react from "@vitejs/plugin-react"' + "`n"
          $c += 'import path from "path"' + "`n"
          $c += 'export default defineConfig({' + "`n"
          $c += '  plugins: [react()],' + "`n"
          $c += '  resolve: { alias: { "@": path.resolve(__dirname, "./src") } },' + "`n"
          $c += '  build: { outDir: "dist", emptyOutDir: true, rollupOptions: { external: ["electron"] } },' + "`n"
          $c += '  base: "./",' + "`n"
          $c += '})' + "`n"
          Set-Content -Path "vite.config.ts" -Value $c -Encoding UTF8
          Write-Host "vite.config.ts overwritten"
          Get-Content "vite.config.ts"

      - name: Build Windows
        shell: pwsh
        run: npx vite build && npx tsc -p electron/tsconfig.json && npx electron-builder --win
        working-directory: apps/ava-softphone-desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          WIN_CSC_LINK: ''

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: apps/ava-softphone-desktop/dist-electron/*.exe
          if-no-files-found: warn

  build-mac:
    needs: verify-version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: apps/ava-softphone-desktop

      - name: Overwrite vite.config.ts AFTER install
        working-directory: apps/ava-softphone-desktop
        run: |
          cat > vite.config.ts << 'VITEEOF'
import { defineConfig } from "vite"
import react from "@vitejs/plugin-react"
import path from "path"
export default defineConfig({
  plugins: [react()],
  resolve: { alias: { "@": path.resolve(__dirname, "./src") } },
  build: { outDir: "dist", emptyOutDir: true, rollupOptions: { external: ["electron"] } },
  base: "./",
})
VITEEOF
          echo "vite.config.ts overwritten:"
          cat vite.config.ts

      - name: Build Mac
        run: npx vite build && npx tsc -p electron/tsconfig.json && npx electron-builder --mac --x64 --arm64
        working-directory: apps/ava-softphone-desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          CSC_LINK: ''

      - uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: apps/ava-softphone-desktop/dist-electron/*.dmg
          if-no-files-found: warn

  build-linux:
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libnotify-dev \
            libasound2-dev libcups2-dev libxss1 libxtst6 xvfb \
            libx11-xcb1 libxcb-dri3-0 libdrm2 libgbm1 libnss3 \
            libatk-bridge2.0-0

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: apps/ava-softphone-desktop

      - name: Overwrite vite.config.ts AFTER install
        working-directory: apps/ava-softphone-desktop
        run: |
          cat > vite.config.ts << 'VITEEOF'
import { defineConfig } from "vite"
import react from "@vitejs/plugin-react"
import path from "path"
export default defineConfig({
  plugins: [react()],
  resolve: { alias: { "@": path.resolve(__dirname, "./src") } },
  build: { outDir: "dist", emptyOutDir: true, rollupOptions: { external: ["electron"] } },
  base: "./",
})
VITEEOF
          echo "vite.config.ts overwritten:"
          cat vite.config.ts

      - name: Build Linux
        run: npx vite build && npx tsc -p electron/tsconfig.json && npx electron-builder --linux
        working-directory: apps/ava-softphone-desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            apps/ava-softphone-desktop/dist-electron/*.AppImage
            apps/ava-softphone-desktop/dist-electron/*.deb
          if-no-files-found: warn

  create-release:
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - run: find artifacts -type f | sort
      - if: >
          github.event_name == 'release' ||
          startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_unmatched_files: false
