name: Build & Release AVA Softphone

on:
  push:
    tags:
      - 'v*.*.*'
      - 'desktop-v*'
  release:
    types: [published, created]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cat apps/ava-softphone-desktop/package.json | grep '"version"'

  build-windows:
    needs: verify-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Overwrite vite.config.ts
        shell: pwsh
        run: |
          $config = @'
import { defineConfig } from "vite"
import react from "@vitejs/plugin-react"
import path from "path"
export default defineConfig({
  plugins: [react()],
  resolve: { alias: { "@": path.resolve(__dirname, "./src") } },
  build: { outDir: "dist", emptyOutDir: true, rollupOptions: { external: ["electron"] } },
  base: "./",
})
'@
          Set-Content -Path "vite.config.ts" -Value $config -Encoding UTF8
        working-directory: apps/ava-softphone-desktop

      - name: Overwrite package.json
        shell: pwsh
        run: |
          $pkg = @'
{
  "name": "ava-softphone",
  "version": "1.0.0",
  "description": "AVA Softphone",
  "main": "electron/main.js",
  "scripts": {
    "build:win": "vite build && tsc -p electron/tsconfig.json && electron-builder --win"
  },
  "dependencies": {
    "react": "^18.2.0",
    "react-dom": "^18.2.0",
    "jssip": "^3.10.0",
    "@supabase/supabase-js": "^2.39.0",
    "electron-updater": "^6.1.7",
    "electron-store": "^8.1.0"
  },
  "devDependencies": {
    "@types/react": "^18.2.0",
    "@types/react-dom": "^18.2.0",
    "@vitejs/plugin-react": "^4.3.4",
    "concurrently": "^9.1.2",
    "electron": "^33.0.0",
    "electron-builder": "^25.1.8",
    "typescript": "^5.6.3",
    "vite": "^5.4.21"
  },
  "build": { "extends": "./electron-builder.yml" }
}
'@
          Set-Content -Path "package.json" -Value $pkg -Encoding UTF8
        working-directory: apps/ava-softphone-desktop

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: apps/ava-softphone-desktop

      - name: Build Windows
        shell: pwsh
        run: npm run build:win
        working-directory: apps/ava-softphone-desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          WIN_CSC_LINK: ''

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: apps/ava-softphone-desktop/dist-electron/*.exe
          if-no-files-found: warn

  build-mac:
    needs: verify-version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Overwrite vite.config.ts + package.json
        run: |
          cat > vite.config.ts << 'EOF'
import { defineConfig } from "vite"
import react from "@vitejs/plugin-react"
import path from "path"
export default defineConfig({
  plugins: [react()],
  resolve: { alias: { "@": path.resolve(__dirname, "./src") } },
  build: { outDir: "dist", emptyOutDir: true, rollupOptions: { external: ["electron"] } },
  base: "./",
})
EOF
          cat > package.json << 'EOF'
{
  "name": "ava-softphone",
  "version": "1.0.0",
  "main": "electron/main.js",
  "scripts": {
    "build:mac": "vite build && tsc -p electron/tsconfig.json && electron-builder --mac --x64 --arm64"
  },
  "dependencies": {
    "react": "^18.2.0", "react-dom": "^18.2.0",
    "jssip": "^3.10.0", "@supabase/supabase-js": "^2.39.0",
    "electron-updater": "^6.1.7", "electron-store": "^8.1.0"
  },
  "devDependencies": {
    "@types/react": "^18.2.0", "@types/react-dom": "^18.2.0",
    "@vitejs/plugin-react": "^4.3.4", "concurrently": "^9.1.2",
    "electron": "^33.0.0", "electron-builder": "^25.1.8",
    "typescript": "^5.6.3", "vite": "^5.4.21"
  },
  "build": { "extends": "./electron-builder.yml" }
}
EOF
        working-directory: apps/ava-softphone-desktop

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: apps/ava-softphone-desktop

      - name: Build Mac
        run: npm run build:mac
        working-directory: apps/ava-softphone-desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          CSC_LINK: ''

      - uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: apps/ava-softphone-desktop/dist-electron/*.dmg
          if-no-files-found: warn

  build-linux:
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libnotify-dev \
            libasound2-dev libcups2-dev libxss1 libxtst6 xvfb \
            libx11-xcb1 libxcb-dri3-0 libdrm2 libgbm1 libnss3 \
            libatk-bridge2.0-0

      - name: Overwrite vite.config.ts + package.json
        run: |
          cat > vite.config.ts << 'EOF'
import { defineConfig } from "vite"
import react from "@vitejs/plugin-react"
import path from "path"
export default defineConfig({
  plugins: [react()],
  resolve: { alias: { "@": path.resolve(__dirname, "./src") } },
  build: { outDir: "dist", emptyOutDir: true, rollupOptions: { external: ["electron"] } },
  base: "./",
})
EOF
          cat > package.json << 'EOF'
{
  "name": "ava-softphone",
  "version": "1.0.0",
  "main": "electron/main.js",
  "scripts": {
    "build:linux": "vite build && tsc -p electron/tsconfig.json && electron-builder --linux"
  },
  "dependencies": {
    "react": "^18.2.0", "react-dom": "^18.2.0",
    "jssip": "^3.10.0", "@supabase/supabase-js": "^2.39.0",
    "electron-updater": "^6.1.7", "electron-store": "^8.1.0"
  },
  "devDependencies": {
    "@types/react": "^18.2.0", "@types/react-dom": "^18.2.0",
    "@vitejs/plugin-react": "^4.3.4", "concurrently": "^9.1.2",
    "electron": "^33.0.0", "electron-builder": "^25.1.8",
    "typescript": "^5.6.3", "vite": "^5.4.21"
  },
  "build": { "extends": "./electron-builder.yml" }
}
EOF
        working-directory: apps/ava-softphone-desktop

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: apps/ava-softphone-desktop

      - name: Build Linux
        run: npm run build:linux
        working-directory: apps/ava-softphone-desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            apps/ava-softphone-desktop/dist-electron/*.AppImage
            apps/ava-softphone-desktop/dist-electron/*.deb
          if-no-files-found: warn

  create-release:
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - run: find artifacts -type f | sort
      - if: >
          github.event_name == 'release' ||
          startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_unmatched_files: false
