name: Bump Desktop Version & Tag

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump (patch | minor | major)'
        required: true
        default: 'patch'
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with: { node-version: '24' }

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        working-directory: apps/ava-softphone-desktop
        run: |
          NEW=$(npm version ${{ inputs.bump }} --no-git-tag-version)
          echo "version=${NEW#v}" >> "$GITHUB_OUTPUT"

      - name: Commit & tag
        run: |
          V=${{ steps.bump.outputs.version }}
          git add apps/ava-softphone-desktop/package.json
          git commit -m "chore(desktop): release v$V"
          git tag "desktop-v$V"
          git push origin HEAD --tags

      - run: echo "Tag desktop-v${{ steps.bump.outputs.version }} pushed — release workflow will start."
