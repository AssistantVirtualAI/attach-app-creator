name: Build & Release AVA Softphone

on:
  push:
    tags:
      - 'v*.*.*'
      - 'desktop-v*'
  release:
    types: [published, created]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: false
        default: '1.0.0'

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Required GitHub secrets for signing:
#   MAC_CERTS = base64 encoded .p12 certificate
#   MAC_CERTS_PASSWORD = certificate password
#   APPLE_ID = mhassoun@assistantvirtualai.com
#   APPLE_APP_PASSWORD = app-specific password from appleid.apple.com

jobs:
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify package.json
        run: |
          cat apps/ava-softphone-desktop/package.json | grep '"version"'

  build-windows:
    needs: verify-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install app dependencies
        run: npm install --legacy-peer-deps
        working-directory: apps/ava-softphone-desktop

      - name: Delete root postcss + clear cache
        shell: pwsh
        working-directory: apps/ava-softphone-desktop
        run: |
          Remove-Item -Path "..\..\postcss.config.js" -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "..\..\postcss.config.cjs" -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "..\..\postcss.config.mjs" -Force -ErrorAction SilentlyContinue
          Get-ChildItem -Path "." -Filter "vite.config.ts.timestamp*" -Recurse -ErrorAction SilentlyContinue | Remove-Item -Force
          if (Test-Path "node_modules/.vite") { Remove-Item -Recurse -Force "node_modules/.vite" }
          Write-Host "Root postcss deleted, cache cleared"

      - name: Build Windows
        shell: pwsh
        run: |
          npx vite build
          npx tsc -p electron/tsconfig.json
          npx electron-builder --win
        working-directory: apps/ava-softphone-desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'true'
          WIN_CSC_LINK: ''
          WIN_CSC_KEY_PASSWORD: ''

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            apps/ava-softphone-desktop/dist-electron/*.exe
            apps/ava-softphone-desktop/dist-electron/*.msi
            apps/ava-softphone-desktop/dist-electron/*.yml
            apps/ava-softphone-desktop/dist-electron/*.blockmap
          if-no-files-found: warn

  build-mac:
    needs: verify-version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install app dependencies
        run: npm install --legacy-peer-deps
        working-directory: apps/ava-softphone-desktop

      - name: Delete root postcss + clear cache
        working-directory: apps/ava-softphone-desktop
        run: |
          rm -f ../../postcss.config.js ../../postcss.config.cjs ../../postcss.config.mjs
          find . -name "vite.config.ts.timestamp*" -delete 2>/dev/null || true
          rm -rf node_modules/.vite 2>/dev/null || true
          echo "Root postcss deleted, cache cleared"
          ls -la ../../postcss* 2>/dev/null || echo "No postcss files at root"

      - name: Build Mac
        run: |
          npx vite build
          npx tsc -p electron/tsconfig.json
          npx electron-builder --mac --x64 --arm64
        working-directory: apps/ava-softphone-desktop
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CERTS }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'true'
          APPLE_TEAM_ID: 64XSWWB49N

      - name: Notarize macOS DMG
        if: runner.os == 'macOS'
        run: |
          for dmg in apps/ava-softphone-desktop/dist-electron/*.dmg; do
            echo "Notarizing: $dmg"
            xcrun notarytool submit "$dmg" \
              --apple-id "${{ secrets.APPLE_ID }}" \
              --password "${{ secrets.APPLE_APP_PASSWORD }}" \
              --team-id "64XSWWB49N" \
              --wait || echo "Notarization skipped (no credentials)"
          done
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: |
            apps/ava-softphone-desktop/dist-electron/*.dmg
            apps/ava-softphone-desktop/dist-electron/*.zip
            apps/ava-softphone-desktop/dist-electron/*.yml
            apps/ava-softphone-desktop/dist-electron/*.blockmap
          if-no-files-found: warn

  build-linux:
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libnotify-dev libasound2-dev \
            libcups2-dev libxss1 libxtst6 xvfb \
            libx11-xcb1 libxcb-dri3-0 libdrm2 \
            libgbm1 libnss3 libatk-bridge2.0-0

      - name: Install app dependencies
        run: npm install --legacy-peer-deps
        working-directory: apps/ava-softphone-desktop

      - name: Delete root postcss + clear cache
        working-directory: apps/ava-softphone-desktop
        run: |
          rm -f ../../postcss.config.js ../../postcss.config.cjs ../../postcss.config.mjs
          find . -name "vite.config.ts.timestamp*" -delete 2>/dev/null || true
          rm -rf node_modules/.vite 2>/dev/null || true
          echo "Root postcss deleted, cache cleared"
          ls -la ../../postcss* 2>/dev/null || echo "No postcss files at root"

      - name: Build Linux
        run: |
          npx vite build
          npx tsc -p electron/tsconfig.json
          npx electron-builder --linux
        working-directory: apps/ava-softphone-desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'true'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            apps/ava-softphone-desktop/dist-electron/*.AppImage
            apps/ava-softphone-desktop/dist-electron/*.deb
            apps/ava-softphone-desktop/dist-electron/*.yml
          if-no-files-found: warn

  create-release:
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Update GitHub Release
        if: >
          github.event_name == 'release' ||
          startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_unmatched_files: false
