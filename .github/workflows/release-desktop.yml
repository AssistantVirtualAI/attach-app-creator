name: Release Desktop

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-mac:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install & Build
        working-directory: apps/ava-softphone-desktop
        run: |
          npm install
          npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Create Release & Upload
        working-directory: apps/ava-softphone-desktop
        run: |
          gh release create ${{ github.ref_name }} \
            dist-electron/*.dmg \
            dist-electron/*.zip \
            dist-electron/*-mac.zip \
            --title "Lemtel Telecom ${{ github.ref_name }}" \
            --notes "Auto-release ${{ github.ref_name }}" \
            --latest 2>/dev/null || \
          gh release upload ${{ github.ref_name }} \
            dist-electron/*.dmg \
            dist-electron/*.zip \
            --clobber 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
