name: Release Desktop

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-mac:
    runs-on: self-hosted
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        working-directory: apps/ava-softphone-desktop
        run: npm install
      - name: Build Vite + TypeScript
        working-directory: apps/ava-softphone-desktop
        run: npx vite build && npx tsc -p electron/tsconfig.json
      - name: Package Mac
        working-directory: apps/ava-softphone-desktop
        run: npx electron-builder --mac --arm64 --x64 --publish never
      - name: List dist files
        working-directory: apps/ava-softphone-desktop
        run: ls -la dist-electron/*.dmg dist-electron/*.zip 2>/dev/null
      - name: Create GitHub Release
        working-directory: apps/ava-softphone-desktop
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Lemtel Telecom ${{ github.ref_name }}" \
            --notes "Release ${{ github.ref_name }}" \
            --latest || true
          for f in dist-electron/*.dmg dist-electron/*.zip; do
            gh release upload ${{ github.ref_name }} "$f" --clobber || true
          done
