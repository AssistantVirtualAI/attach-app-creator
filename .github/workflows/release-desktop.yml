name: Release Desktop

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-mac:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install & Build
        working-directory: apps/ava-softphone-desktop
        run: |
          npm install
          npx electron-builder --mac --arm64 --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          EP_DRAFT: false
          PUBLISH: never
      - name: Upload to Release
        working-directory: apps/ava-softphone-desktop
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Lemtel Telecom ${{ github.ref_name }}" \
            --notes "Auto-release ${{ github.ref_name }}" \
            --latest 2>/dev/null || true
          gh release upload ${{ github.ref_name }} \
            dist-electron/*.dmg \
            dist-electron/*.zip \
            --clobber 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  build-env:
    GH_TOKEN: ""
