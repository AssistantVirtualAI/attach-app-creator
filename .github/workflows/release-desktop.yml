name: Build & Release AVA Softphone

on:
  push:
    tags:
      - 'v*.*.*'
      - 'desktop-v*'
  release:
    types: [published, created]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: false
        default: '1.0.0'

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify package.json
        run: cat apps/ava-softphone-desktop/package.json | grep '"version"'

  build-windows:
    needs: verify-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Remove root PostCSS config
        shell: pwsh
        run: |
          $files = @(
            "postcss.config.js",
            "postcss.config.cjs",
            "postcss.config.mjs"
          )
          foreach ($f in $files) {
            if (Test-Path $f) {
              Remove-Item $f -Force
              Write-Host "Deleted: $f"
            } else {
              Write-Host "Not found: $f"
            }
          }

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: apps/ava-softphone-desktop

      - name: Build Windows
        shell: pwsh
        run: |
          Remove-Item -Path "..\..\postcss.config.js" `
            -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "..\..\postcss.config.cjs" `
            -Force -ErrorAction SilentlyContinue
          npx vite build --config vite.config.ts
          npx tsc -p electron/tsconfig.json
          npx electron-builder --win
        working-directory: apps/ava-softphone-desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          WIN_CSC_LINK: ''
          WIN_CSC_KEY_PASSWORD: ''

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            apps/ava-softphone-desktop/dist-electron/*.exe
            apps/ava-softphone-desktop/dist-electron/*.msi
            apps/ava-softphone-desktop/dist-electron/*.yml
            apps/ava-softphone-desktop/dist-electron/*.blockmap
          if-no-files-found: warn

  build-mac:
    needs: verify-version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Remove root PostCSS config
        shell: bash
        run: |
          for f in postcss.config.js postcss.config.cjs \
                   postcss.config.mjs; do
            if [ -f "$f" ]; then
              rm -f "$f"
              echo "Deleted: $f"
            else
              echo "Not found: $f"
            fi
          done

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: apps/ava-softphone-desktop

      - name: Build Mac
        shell: bash
        run: |
          rm -f ../../postcss.config.js \
                ../../postcss.config.cjs \
                ../../postcss.config.mjs || true
          npx vite build --config vite.config.ts
          npx tsc -p electron/tsconfig.json
          npx electron-builder --mac --x64 --arm64
        working-directory: apps/ava-softphone-desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          CSC_LINK: ''
          APPLE_ID: ''
          APPLE_APP_SPECIFIC_PASSWORD: ''
          APPLE_TEAM_ID: ''

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: |
            apps/ava-softphone-desktop/dist-electron/*.dmg
            apps/ava-softphone-desktop/dist-electron/*.zip
            apps/ava-softphone-desktop/dist-electron/*.yml
            apps/ava-softphone-desktop/dist-electron/*.blockmap
          if-no-files-found: warn

  build-linux:
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libnotify-dev libasound2-dev \
            libcups2-dev libxss1 libxtst6 xvfb \
            libx11-xcb1 libxcb-dri3-0 libdrm2 \
            libgbm1 libnss3 libatk-bridge2.0-0

      - name: Remove root PostCSS config
        shell: bash
        run: |
          for f in postcss.config.js postcss.config.cjs \
                   postcss.config.mjs; do
            if [ -f "$f" ]; then
              rm -f "$f"
              echo "Deleted: $f"
            else
              echo "Not found: $f"
            fi
          done

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: apps/ava-softphone-desktop

      - name: Build Linux
        shell: bash
        run: |
          rm -f ../../postcss.config.js \
                ../../postcss.config.cjs \
                ../../postcss.config.mjs || true
          npx vite build --config vite.config.ts
          npx tsc -p electron/tsconfig.json
          npx electron-builder --linux
        working-directory: apps/ava-softphone-desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            apps/ava-softphone-desktop/dist-electron/*.AppImage
            apps/ava-softphone-desktop/dist-electron/*.deb
            apps/ava-softphone-desktop/dist-electron/*.yml
          if-no-files-found: warn

  create-release:
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Update GitHub Release
        if: >
          github.event_name == 'release' ||
          startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_unmatched_files: false
