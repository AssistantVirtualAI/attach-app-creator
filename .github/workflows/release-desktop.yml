name: Release AVA Softphone Desktop

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:

defaults:
  run:
    working-directory: apps/ava-softphone-desktop

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            apps/ava-softphone-desktop/release/*.exe
            apps/ava-softphone-desktop/release/*.yml
            apps/ava-softphone-desktop/release/*.blockmap

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            apps/ava-softphone-desktop/release/*.dmg
            apps/ava-softphone-desktop/release/*.yml
            apps/ava-softphone-desktop/release/*.blockmap

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            apps/ava-softphone-desktop/release/*.AppImage
            apps/ava-softphone-desktop/release/*.deb
            apps/ava-softphone-desktop/release/*.yml

  create-release:
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AVA Softphone ${{ github.ref_name }}
          generate_release_notes: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
