name: Release Desktop

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: self-hosted
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        working-directory: apps/ava-softphone-desktop
        run: npm install
      - name: Build Vite + TypeScript
        working-directory: apps/ava-softphone-desktop
        run: npx vite build && npx tsc -p electron/tsconfig.json
      - name: Package Mac
        working-directory: apps/ava-softphone-desktop
        run: |
          APPLE_ID="mhassoun@assistantvirtualai.com" \
          APPLE_APP_SPECIFIC_PASSWORD="xevv-jhkt-hdui-gepy" \
          APPLE_TEAM_ID="64XSWWB49N" \
          npx electron-builder --mac --arm64 --x64 --publish never
      - name: Package Windows
        working-directory: apps/ava-softphone-desktop
        run: npx electron-builder --win --x64 --publish never
      - name: Create Release with files
        working-directory: apps/ava-softphone-desktop
        run: |
          TAG="${{ github.ref_name }}"
          gh release delete "$TAG" --yes 2>/dev/null || true
          sleep 3
          gh release create "$TAG" \
            --title "Lemtel Telecom $TAG" \
            --notes "Release $TAG" \
            --latest
          find dist-electron -maxdepth 1 \( -name "*.dmg" -o -name "*.exe" -o -name "*.zip" \) | while read f; do
            gh release upload "$TAG" "$f" --clobber
          done
