name: Release Desktop

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-mac:
    runs-on: self-hosted
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        working-directory: apps/ava-softphone-desktop
        run: npm install
      - name: Build Vite + TypeScript
        working-directory: apps/ava-softphone-desktop
        run: npx vite build && npx tsc -p electron/tsconfig.json
      - name: Package Mac
        working-directory: apps/ava-softphone-desktop
        run: |
          APPLE_ID="mhassoun@assistantvirtualai.com" \
          APPLE_APP_SPECIFIC_PASSWORD="xevv-jhkt-hdui-gepy" \
          APPLE_TEAM_ID="64XSWWB49N" \
          npx electron-builder --mac --arm64 --x64 --publish never
      - name: Package Windows
        working-directory: apps/ava-softphone-desktop
        run: npx electron-builder --win --x64 --publish never
      - name: List dist files
        working-directory: apps/ava-softphone-desktop
        run: ls -la dist-electron/
      - name: Upload files to release
        working-directory: apps/ava-softphone-desktop
        run: |
          for f in dist-electron/*.dmg dist-electron/*.exe dist-electron/*.zip; do
            [ -f "$f" ] && gh release upload ${{ github.ref_name }} "$f" --clobber && echo "Uploaded $f" || true
          done
