name: Release Desktop

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-mac:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install & Build
        working-directory: apps/ava-softphone-desktop
        run: |
          npm install
          npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload to Release
        working-directory: apps/ava-softphone-desktop
        run: |
          gh release upload ${{ github.ref_name }} dist-electron/*.dmg dist-electron/*.zip || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
