name: Generate Release Notes

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate CHANGELOG
        run: |
          cat > CHANGELOG.md << 'HEADER'
          # Lemtel Telecom — Changelog

          Auto-generated from git commits.

          HEADER
          git log --oneline --no-merges --format="- %s (%ad) — %an" --date=short -50 >> CHANGELOG.md

      - name: Configure git
        run: |
          git config user.name "AVA Bot"
          git config user.email "bot@assistantvirtualai.com"

      - name: Commit changelog
        run: |
          git add CHANGELOG.md
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "docs: update CHANGELOG [skip ci]"
            git push
          fi
