<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AVA Softphone · Powered by AVA AI</title>
    <link rel="icon" type="image/png" href="/lemtel-icon.png" />
    <link rel="apple-touch-icon" href="/lemtel-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />

    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body, #root {
        height: 100%;
        margin: 0;
        font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-feature-settings: 'ss01', 'cv11';
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background:
          radial-gradient(1200px 700px at 8% -10%, rgba(0,35,230,0.10), transparent 60%),
          radial-gradient(900px 600px at 110% 110%, rgba(33,212,253,0.10), transparent 55%),
          linear-gradient(180deg, #eef2fa 0%, #dde4f1 100%);
        color: #0b1530;
        transition: background 240ms ease, color 240ms ease;
      }
      h1, h2, h3, h4, .display, .ava-display {
        font-family: 'Space Grotesk', 'DM Sans', sans-serif;
        letter-spacing: -0.01em;
      }
      button, input, select, textarea { font-family: inherit; }
      .tabular-nums, .ava-num { font-variant-numeric: tabular-nums; font-feature-settings: 'tnum'; }

      /* Brand-tinted scrollbar */
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, rgba(0,35,230,0.28), rgba(33,212,253,0.28));
        border-radius: 10px;
        border: 2px solid transparent;
        background-clip: padding-box;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(180deg, rgba(0,35,230,0.55), rgba(33,212,253,0.55));
        background-clip: padding-box;
        border: 2px solid transparent;
      }

      /* Focus ring */
      :focus-visible {
        outline: 2px solid #4d6dff;
        outline-offset: 2px;
        box-shadow: 0 0 0 4px rgba(77,109,255,0.20);
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
