<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AVA Softphone · Powered by AVA AI</title>
    <link rel="icon" type="image/png" href="/lemtel-icon.png" />
    <link rel="apple-touch-icon" href="/lemtel-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />

    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body, #root {
        height: 100%;
        margin: 0;
        font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-feature-settings: 'ss01', 'cv11';
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background:
          radial-gradient(1200px 700px at 8% -10%, rgba(0,35,230,0.10), transparent 60%),
          radial-gradient(900px 600px at 110% 110%, rgba(33,212,253,0.10), transparent 55%),
          linear-gradient(180deg, #eef2fa 0%, #dde4f1 100%);
        color: #0b1530;
        transition: background 240ms ease, color 240ms ease;
      }
      html, body { font-size: 14px; line-height: 1.45; letter-spacing: -0.003em; text-rendering: optimizeLegibility; }
      h1, h2, h3, h4, .display, .ava-display {
        font-family: 'Space Grotesk', 'DM Sans', sans-serif;
        letter-spacing: -0.018em;
        line-height: 1.18;
        font-weight: 600;
      }
      h1 { font-size: clamp(22px, 3vw, 30px); }
      h2 { font-size: clamp(18px, 2.4vw, 22px); }
      h3 { font-size: clamp(15px, 1.8vw, 17px); }
      button, input, select, textarea { font-family: inherit; letter-spacing: inherit; }
      button { font-feature-settings: 'tnum', 'ss01', 'cv11'; }
      .tabular-nums, .ava-num { font-variant-numeric: tabular-nums lining-nums; font-feature-settings: 'tnum'; }
      /* Caps utility: tightened, balanced tracking that matches the glass surfaces */
      .ava-caps { text-transform: uppercase; font-weight: 600; letter-spacing: 0.12em; font-size: 10.5px; }
      .ava-caps-sm { text-transform: uppercase; font-weight: 700; letter-spacing: 0.14em; font-size: 9px; }
      /* Display number used by dialer / call timer */
      .ava-display-num {
        font-family: 'Space Grotesk', 'DM Sans', sans-serif;
        font-variant-numeric: tabular-nums lining-nums;
        font-feature-settings: 'tnum';
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      /* Mute decorative emoji from font-stack quirks */
      [aria-hidden="true"] { font-feature-settings: normal; }

      /* Brand-tinted scrollbar */
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, rgba(0,35,230,0.28), rgba(33,212,253,0.28));
        border-radius: 10px;
        border: 2px solid transparent;
        background-clip: padding-box;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(180deg, rgba(0,35,230,0.55), rgba(33,212,253,0.55));
        background-clip: padding-box;
        border: 2px solid transparent;
      }

      /* Neon focus ring — theme-aware via CSS vars */
      :focus-visible {
        outline: 2px solid var(--ava-accent, #4d6dff);
        outline-offset: 2px;
        box-shadow: 0 0 0 4px var(--ava-ring-glow, rgba(77,109,255,0.20)), 0 0 18px -2px var(--ava-accent, #4d6dff);
        border-radius: 10px;
      }

      /* Animated aurora drift on the body for futuristic depth */
      @keyframes ava-aurora-drift {
        0%   { transform: translate3d(0,0,0) scale(1); }
        50%  { transform: translate3d(2%, 1%, 0) scale(1.05); }
        100% { transform: translate3d(0,0,0) scale(1); }
      }
      body::before {
        content: ''; position: fixed; inset: -10%; pointer-events: none; z-index: 0;
        background:
          radial-gradient(800px 500px at 15% 10%, var(--ava-accent-soft, rgba(0,35,230,0.18)), transparent 60%),
          radial-gradient(700px 500px at 90% 90%, rgba(33,212,253,0.16), transparent 55%);
        animation: ava-aurora-drift 22s ease-in-out infinite;
        mix-blend-mode: screen;
      }

      /* Subtle scanline on active dock pill */
      @keyframes ava-scanline {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }
      .ava-scan { position: relative; overflow: hidden; }
      .ava-scan::after {
        content: ''; position: absolute; inset: 0;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
        animation: ava-scanline 2.4s ease-in-out infinite;
        pointer-events: none;
      }

      /* Pulse animation reused */
      @keyframes statusPulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.55; transform: scale(1.25); }
      }
    </style>
    <script>
      // Pre-paint: set theme attribute + base background before React mounts
      // to avoid a white flash when the saved theme is dark/midnight.
      (function () {
        try {
          var m = localStorage.getItem('ava-softphone-theme');
          if (m === 'dark' || m === 'midnight' || m === 'daylight' || m === 'light') {
            document.documentElement.setAttribute('data-ava-theme', m);
            var bgMap = {
              daylight: '#f6f9ff', light: '#eef2fa',
              dark: '#0b1124', midnight: '#05081a'
            };
            var fgMap = {
              daylight: '#0a1226', light: '#0b1530',
              dark: '#eaf0ff', midnight: '#f1f5ff'
            };
            document.documentElement.style.background = bgMap[m];
            document.documentElement.style.color = fgMap[m];
          }
        } catch (e) {}
      })();
    </script>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
