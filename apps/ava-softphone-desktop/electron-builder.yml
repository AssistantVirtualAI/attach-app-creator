appId: com.lemtel.softphone
productName: Lemtel Telecom
copyright: "Copyright 2026 Lemtel Communications. Powered by AVA AI."
directories:
  output: dist-electron
files:
  - dist/**/*
  - electron-compiled/**/*
  - assets/**/*
  - package.json
mac:
  category: public.app-category.business
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
win:
  target:
    - target: nsis
      arch: [x64]
  publisherName: "Lemtel Communications"
  signingHashAlgorithms: []
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "Lemtel Telecom"
linux:
  target:
    - AppImage
    - deb
  category: Office
publish:
  - provider: github
    owner: AssistantVirtualAI
    repo: attach-app-creator
    private: false
    releaseType: release
