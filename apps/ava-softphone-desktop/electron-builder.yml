appId: com.lemtel.softphone
productName: Lemtel Telecom
copyright: "Copyright 2026 Automatisation Assistant Virtuel IA Inc."
directories:
  output: dist-electron
icon: assets/icon.png
files:
  - dist/**/*
  - electron-compiled/**/*
  - assets/**/*
  - package.json
mac:
  category: public.app-category.business
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.plist
  icon: assets/icon.png
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
win:
  icon: assets/icon.png
  target:
    - target: nsis
      arch: [x64]
  signtoolOptions:
    publisherName: "Automatisation Assistant Virtuel IA Inc."
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: "Lemtel Telecom"
linux:
  icon: assets/icon.png
  target:
    - AppImage
  category: Office
  maintainer: "Automatisation Assistant Virtuel IA Inc. <support@assistantvirtualai.com>"

