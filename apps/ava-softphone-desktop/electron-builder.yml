appId: com.lemtel.softphone
productName: Lemtel Telecom
copyright: "Copyright 2026 Lemtel Communications. Powered by AVA AI."
directories:
  output: dist-electron
files:
  - dist/**/*
  - electron-compiled/**/*
  - assets/**/*
  - package.json
mac:
  category: public.app-category.business
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false
  extendInfo:
    NSMicrophoneUsageDescription: "Lemtel Telecom needs microphone access to make and receive voice calls over your business phone system."
    NSCameraUsageDescription: "Lemtel Telecom uses the camera for video calls."
    NSContactsUsageDescription: "Lemtel Telecom accesses your contacts to display caller names and make dialing easier."
    NSSpeechRecognitionUsageDescription: "Lemtel Telecom uses speech recognition to transcribe calls and provide AI insights."
    NSBluetoothAlwaysUsageDescription: "Lemtel Telecom uses Bluetooth to connect to wireless headsets for calls."
    NSLocalNetworkUsageDescription: "Lemtel Telecom uses your local network to connect to the SIP server."
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  artifactName: "Lemtel.Telecom-${arch}.${ext}"
win:
  target:
    - target: nsis
      arch: [x64]
  publisherName: "Lemtel Communications"
  signingHashAlgorithms: []
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "Lemtel Telecom"
linux:
  target:
    - AppImage
    - deb
  category: Office
publish:
  - provider: github
    owner: AssistantVirtualAI
    repo: attach-app-creator
    private: false
    releaseType: release
