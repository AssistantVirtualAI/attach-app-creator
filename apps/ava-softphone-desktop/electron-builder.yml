appId: com.lemtel.softphone
productName: Lemtel Telecom
copyright: "Copyright 2026 Lemtel Communications."
directories:
  output: dist-electron
icon: assets/icon.png
files:
  - dist/**/*
  - electron-compiled/**/*
  - assets/**/*
  - package.json
mac:
  category: public.app-category.business
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false
  icon: assets/icon.png
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
win:
  icon: assets/icon.png
  target:
    - target: nsis
      arch: [x64]
  publisherName: "Lemtel Communications"
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: "Lemtel Telecom"
linux:
  icon: assets/icon.png
  target:
    - AppImage
  category: Office
  maintainer: "Lemtel Communications <support@assistantvirtualai.com>"

afterAllArtifactBuild: false
