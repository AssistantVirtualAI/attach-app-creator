<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Lemtel Telecom</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">
    <div class="header">
      <div class="logo" style="display:flex;align-items:center;gap:10px;">
        <img src="../icons/icon48.png" alt="Lemtel" width="32" height="32" style="border-radius:8px;box-shadow:0 4px 12px rgba(0,61,166,0.35);" />
        <div>
          <strong style="color:#FFD700;display:block;line-height:1;">LEMTEL</strong>
          <span style="color:rgba(255,255,255,0.5);font-size:10px;letter-spacing:2px;display:block;">COMMUNICATIONS</span>
        </div>
      </div>
      <div class="status-wrap" title="Extension status">
        <div id="status-indicator" class="status-dot disconnected" title="Status"></div>
        <span id="version-text" class="version-text">v—</span>
      </div>
    </div>

    <div class="status-panel">
      <span id="status-text" class="status-text">Checking extension status…</span>
      <span id="last-dial-text" class="last-dial-text">Ready to open your Mac phone app with tel: links.</span>
    </div>

    <div id="account-info" class="ext-badge hidden">
      <span class="ext-label">Calling through</span>
      <span id="ext-number" class="ext-number">—</span>
    </div>

    <div class="section">
      <span class="section-label">Quick Dial</span>
      <div class="dial-row">
        <input id="dial-input" type="tel" class="dial-input" placeholder="(555) 555-5555" />
        <button id="call-btn" class="call-btn" disabled title="Call">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z" fill="white"/></svg>
        </button>
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <span class="section-label">Numbers on this page</span>
        <span id="numbers-count" class="count-badge">0</span>
      </div>
      <div id="numbers-list" class="numbers-list">
        <div class="empty-state">No phone numbers detected</div>
      </div>
    </div>

    <div class="footer">
      <span>Powered by</span>
      <strong style="color:#FFD700;">AVA AI</strong>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
